apiVersion: apps/v1
kind: Deployment
metadata:
  name: cruise-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cruise-frontend
  template:
    metadata:
      labels:
        app: cruise-frontend
    spec:
      containers:
        - name: frontend
          image: registry.example.com/cruise/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cruise-frontend
spec:
  selector:
    app: cruise-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000

