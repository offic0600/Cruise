apiVersion: apps/v1
kind: Deployment
metadata:
  name: acme-http01-solver
  namespace: cruise
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acme-http01-solver
  template:
    metadata:
      labels:
        app: acme-http01-solver
    spec:
      containers:
        - name: nginx
          image: nginx:1.29-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: acme-files
              mountPath: /usr/share/nginx/html/.well-known/acme-challenge
      volumes:
        - name: acme-files
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: acme-http01-solver
  namespace: cruise
spec:
  selector:
    app: acme-http01-solver
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: acme-http01-solver
  namespace: cruise
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`cruise.cleantrackhotel.com`) && PathPrefix(`/.well-known/acme-challenge/`)
      priority: 400
      services:
        - name: acme-http01-solver
          port: 80
