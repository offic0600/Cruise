apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: node-build
  namespace: pipeline
spec:
  params:
    - name: workdir
      type: string
      description: Relative project directory inside the shared workspace.
    - name: build-script
      type: string
      description: Build command to execute after dependencies are installed.
    - name: pre-script
      type: string
      default: ""
      description: Optional script to run before npm ci.
    - name: npm-registry
      type: string
      default: "https://registry.npmjs.org"
      description: npm registry URL.
  workspaces:
    - name: source
      description: Shared workspace containing the project source.
    - name: npm-cache
      description: Optional persistent npm cache workspace.
      optional: true
  steps:
    - name: node-build
      image: node:20-slim
      workingDir: $(workspaces.source.path)
      env:
        - name: NPM_CACHE_BOUND
          value: $(workspaces.npm-cache.bound)
        - name: NPM_CONFIG_CACHE
          value: $(workspaces.npm-cache.path)/.npm
      script: |
        #!/bin/bash
        set -euo pipefail

        if [ "${NPM_CACHE_BOUND}" = "true" ]; then
          mkdir -p "${NPM_CONFIG_CACHE}"
          echo "npm cache: ${NPM_CONFIG_CACHE}"
        fi

        echo "=== Configure npm registry ==="
        if [ -n "$(params.npm-registry)" ]; then
          npm config set registry "$(params.npm-registry)"
          echo "npm registry: $(params.npm-registry)"
        fi

        echo "=== Enter project directory ==="
        cd "$(params.workdir)"

        cat > /tmp/pre-script.sh << 'PREOF'
        $(params.pre-script)
        PREOF
        if grep -q '[^[:space:]]' /tmp/pre-script.sh; then
          echo "=== Run pre-script ==="
          bash /tmp/pre-script.sh
        fi

        echo "=== Run npm ci ==="
        npm ci

        cat > /tmp/build-script.sh << 'BUILDEOF'
        $(params.build-script)
        BUILDEOF
        if grep -q '[^[:space:]]' /tmp/build-script.sh; then
          echo "=== Run build-script ==="
          bash /tmp/build-script.sh
        fi

        echo "=== Node.js build completed ==="
