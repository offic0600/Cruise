# Cruise Frontend - Tekton Pipeline CRD
# 流程：git-clone -> node-build -> image-build -> deploy
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: cruise-frontend-pipeline
  namespace: pipeline
spec:
  params:
    - name: repo-url
      default: "https://github.com/offic0600/Cruise.git"
    - name: revision
      default: "main"
    - name: image-tag
      default: "latest"
  workspaces:
    - name: shared-workspace
  tasks:
    - name: git-clone
      taskRef:
        name: git-clone
      params:
        - name: url
          value: "$(params.repo-url)"
        - name: revision
          value: "$(params.revision)"
        - name: sslVerify
          value: "false"
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: node-build
      taskRef:
        name: node-build
      runAfter: [git-clone]
      params:
        - name: workdir
          value: frontend
        - name: pre-script
          value: |-
            sed -i "s#http://nexus.haier.net/repository/dts-npm-group/#https://registry.npmjs.org/#g" package-lock.json
        - name: build-script
          value: "npm run build"
        - name: npm-registry
          value: https://registry.npmmirror.com
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: image-build
      taskRef:
        name: image-build
      runAfter: [node-build]
      params:
        - name: image-name
          value: cruise-frontend
        - name: image-tag
          value: "$(params.image-tag)"
        - name: dockerfile
          value: Dockerfile
        - name: context
          value: frontend
        - name: registry
          value: "223.254.144.74:5000"
        - name: push
          value: "true"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: deploy
      taskRef:
        name: kubectl-set-image
      runAfter: [image-build]
      params:
        - name: deployment
          value: cruise-frontend
        - name: container
          value: frontend
        - name: image
          value: "223.254.144.74:5000/cruise-frontend:$(params.image-tag)"
        - name: namespace
          value: cruise
