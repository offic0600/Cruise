server:
  port: 8080

spring:
  application:
    name: cruise

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    parser:
      allow-non-numeric-numbers: true
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  datasource:
    url: jdbc:h2:mem:cruise_db;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.cruise: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate: WARN

jwt:
  secret: cruise-secret-key-for-jwt-token-generation-must-be-long-enough-256-bits
  expiration: 86400000