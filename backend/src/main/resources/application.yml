server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: cruise

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    parser:
      allow-non-numeric-numbers: true
    deserialization:
      fail-on-unknown-properties: false
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:cruise_db;DB_CLOSE_DELAY=-1}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: true

  sql:
    init:
      mode: always

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.cruise: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate: WARN

jwt:
  secret: ${JWT_SECRET:cruise-secret-key-for-jwt-token-generation-must-be-long-enough-256-bits}
  expiration: ${JWT_EXPIRATION:86400000}

cruise:
  auth:
    frontend-base-url: ${CRUISE_AUTH_FRONTEND_BASE_URL:http://localhost:3000}
    backend-base-url: ${CRUISE_AUTH_BACKEND_BASE_URL:http://localhost:8080}
    legacy-password-enabled: true
    default-organization-slug: cruise
    magic-link:
      enabled: true
      token-ttl-minutes: 15
      callback-path: /login/callback
      from-address: noreply@cruise.local
    google:
      enabled: true
      provider-key: google
      provider-type: GOOGLE_OIDC
      display-name: Google
      authorization-url: https://accounts.google.com/o/oauth2/v2/auth
      token-url: https://oauth2.googleapis.com/token
      userinfo-url: https://openidconnect.googleapis.com/v1/userinfo
      scopes: openid profile email
      is-default: false
      # Set client-id and client-secret in deployment env/config before enabling real sign-in.
    enterprise:
      enabled: false
      provider-key: enterprise
      provider-type: ENTERPRISE_OIDC
      display-name: Enterprise SSO
      scopes: openid profile email
      is-default: false
  storage:
    attachments-root: ${CRUISE_STORAGE_ATTACHMENTS_ROOT:storage}

minimax:
  api-key: ${MINIMAX_API_KEY:}
  model: ${MINIMAX_MODEL:MiniMax-M2.5}
  base-url: ${MINIMAX_BASE_URL:https://api.minimax.chat/v1}
