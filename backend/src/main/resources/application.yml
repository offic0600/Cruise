server:
  port: 8080

spring:
  application:
    name: cruise

  datasource:
    url: jdbc:postgresql://localhost:5432/cruise_db
    username: cruise
    password: cruise123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.cruise: INFO
    org.springframework.web: INFO
    org.hibernate: WARN