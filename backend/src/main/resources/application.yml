server:
  port: 8080

spring:
  application:
    name: cruise

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    parser:
      allow-non-numeric-numbers: true
    deserialization:
      fail-on-unknown-properties: false
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  datasource:
    url: jdbc:h2:mem:cruise_db;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  sql:
    init:
      mode: always

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.cruise: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate: WARN

jwt:
  secret: cruise-secret-key-for-jwt-token-generation-must-be-long-enough-256-bits
  expiration: 86400000

cruise:
  auth:
    frontend-base-url: http://localhost:3000
    legacy-password-enabled: true
    default-organization-slug: cruise
    magic-link:
      enabled: true
      token-ttl-minutes: 15
      callback-path: /login/callback
      from-address: noreply@cruise.local
    google:
      enabled: false
      provider-key: google
      provider-type: GOOGLE_OIDC
      display-name: Google
      authorization-url: https://accounts.google.com/o/oauth2/v2/auth
      token-url: https://oauth2.googleapis.com/token
      userinfo-url: https://openidconnect.googleapis.com/v1/userinfo
      scopes: openid profile email
      is-default: false
    enterprise:
      enabled: false
      provider-key: enterprise
      provider-type: ENTERPRISE_OIDC
      display-name: Enterprise SSO
      scopes: openid profile email
      is-default: false

